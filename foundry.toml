[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

# 模糊测试运行次数
fuzz = { runs = 256 }
invariant = { runs = 256 }
gas_reports = ["*"]

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }

[profile.ci]
optimizer_runs = 1

[profile.production]
optimizer_runs = 10000